services:
  hermes-agent:
    image: takalele/hermes-agent:latest-profiles
    container_name: hermes_agent
    restart: unless-stopped
    volumes:
      - ~/.hermes:/opt/data
      - hermes_src:/opt/hermes
    ports:
      - "8642:8642"
      - "9119:9119"
    environment:
      - HERMES_DASHBOARD=1
      - HERMES_UID=${UID:-1000}
      - HERMES_GID=${GID:-1000}
      - TZ=${TZ:-Europe/Vienna}

  hermes-webui:
    image: ghcr.io/nesquena/hermes-webui:latest
    container_name: hermes_webui
    restart: unless-stopped
    depends_on:
      - hermes-agent
    volumes:
      - ~/.hermes:/home/hermeswebui/.hermes
      - hermes_src:/opt/hermes:ro
      - ~/workspace:/workspace
    environment:
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui
      - HERMES_WEBUI_AGENT_DIR=/opt/hermes
      - WANTED_UID=${UID:-1000}
      - WANTED_GID=${GID:-1000}
    ports:
      - "8787:8787"

volumes:
  hermes_src: